name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Build Docker image
        run: docker build -t interview-prep-agent:latest .

      - name: Save Docker image as tarball
        run: docker save interview-prep-agent:latest | gzip > interview-prep-agent.tar.gz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.ORACLE_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Copy image and compose file to Oracle VM
        run: |
          scp -i ~/.ssh/deploy_key \
            interview-prep-agent.tar.gz \
            docker-compose.yml \
            ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}:/opt/interview-prep-agent/

      - name: Load image and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} \
            "cd /opt/interview-prep-agent && \
             docker load < interview-prep-agent.tar.gz && \
             docker compose up -d && \
             rm interview-prep-agent.tar.gz"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
