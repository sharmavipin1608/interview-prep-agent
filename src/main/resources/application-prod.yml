spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/interviewdb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini

logging:
  level:
    root: INFO
    com.vipinsharma: INFO

tavily:
  api-key: ${TAVILY_API_KEY}
