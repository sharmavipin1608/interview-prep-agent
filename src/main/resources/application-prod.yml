spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/interviewdb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile

logging:
  level:
    root: INFO
    com.vipinsharma: INFO

tavily:
  api-key: ${TAVILY_API_KEY}
